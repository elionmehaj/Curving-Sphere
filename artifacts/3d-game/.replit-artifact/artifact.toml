kind = "web"
previewPath = "/"
title = "Ball Roller 3D"
version = "1.0.0"
id = "artifacts/3d-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24982
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/3d-game run dev"

[services.env]
PORT = "24982"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/3d-game", "run", "build"]
publicDir = "artifacts/3d-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
